<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Options Playbook | GOOG · NVDA · TSLA</title>
    <meta name="description" content="Daily options trading analysis for GOOG, NVDA, TSLA — CSP, covered calls, LEAPs. Updated every trading day at 9:30 AM PT.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-hover: #1f1f23;
            --card: #131316;
            --border: #27272a;
            --border-light: #3f3f46;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.12);
            --yellow: #eab308;
            --yellow-dim: rgba(234,179,8,0.12);
            --blue: #3b82f6;
            --blue-dim: rgba(59,130,246,0.12);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Hero ── */
        .hero {
            position: relative;
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
        }
        .hero h1 span { color: var(--accent-light); }
        .hero .tagline {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
        }
        .ticker-row {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .ticker-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.35rem 0.85rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            font-family: 'JetBrains Mono', monospace;
        }
        .ticker-pill .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent-light);
        }

        /* ── Container ── */
        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        /* ── Timeline ── */
        .timeline {
            position: relative;
            padding-left: 1.5rem;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent), var(--border) 30%, var(--border));
            border-radius: 2px;
        }

        /* ── Entry Card ── */
        .card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 1.25rem;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border-light); }

        /* timeline dot */
        .card::before {
            content: '';
            position: absolute;
            left: -1.5rem;
            top: 1.6rem;
            width: 10px; height: 10px;
            margin-left: -4px;
            border-radius: 50%;
            background: var(--border-light);
            border: 2px solid var(--bg);
            z-index: 1;
        }
        .card:first-child::before {
            background: var(--accent-light);
            box-shadow: 0 0 8px rgba(99,102,241,0.4);
        }

        .card-header {
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .card-date {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .card-date .day {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.85rem;
            margin-left: 0.3rem;
        }
        .card-prices {
            display: flex;
            gap: 0.6rem;
            flex-shrink: 0;
        }
        .price-chip {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
        }
        .price-chip .sym {
            color: var(--text-muted);
            margin-right: 0.2rem;
        }

        /* ── Summary (always visible) ── */
        .card-summary {
            padding: 0 1.25rem 1rem;
        }
        .bullet-list {
            list-style: none;
        }
        .bullet-list li {
            position: relative;
            padding: 0.3rem 0 0.3rem 1.4rem;
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .bullet-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.7rem;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }
        .bullet-list li:nth-child(1)::before { background: var(--green); }
        .bullet-list li:nth-child(2)::before { background: var(--yellow); }
        .bullet-list li:nth-child(3)::before { background: var(--red); }
        .bullet-list li strong { color: var(--text); font-weight: 500; }

        /* ── Expand toggle ── */
        .card-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.65rem 1.25rem;
            border-top: 1px solid var(--border);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            user-select: none;
            transition: background 0.15s, color 0.15s;
        }
        .card-toggle:hover {
            background: var(--surface-hover);
            color: var(--text-secondary);
        }
        .card-toggle .arrow {
            transition: transform 0.2s;
            font-size: 0.65rem;
        }
        .card.open .card-toggle .arrow { transform: rotate(180deg); }
        .card.open .card-toggle .label-show { display: none; }
        .card .card-toggle .label-hide { display: none; }
        .card.open .card-toggle .label-hide { display: inline; }

        /* ── Detail body ── */
        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .card.open .card-body {
            max-height: 50000px;
        }
        .card-body-inner {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
        }
        .card-body pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            line-height: 1.75;
            color: var(--text-secondary);
        }

        /* ── 3-red indicator ── */
        .red-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            background: var(--red-dim);
            color: var(--red);
            margin-left: 0.3rem;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
        }
        .footer a { color: var(--accent-light); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
        .empty .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .hero { padding: 2rem 1rem 1.5rem; }
            .hero h1 { font-size: 1.5rem; }
            .container { padding: 0 1rem 3rem; }
            .card-prices { display: none; }
            .timeline { padding-left: 1.2rem; }
            .card-header { padding: 0.85rem 1rem; }
            .card-summary { padding: 0 1rem 0.85rem; }
            .card-body-inner { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>📊 Daily Options <span>Playbook</span></h1>
        <p class="tagline">Strategy analysis updated every trading day at 9:30 AM PT</p>
        <div class="ticker-row">
            <span class="ticker-pill"><span class="dot"></span>GOOG</span>
            <span class="ticker-pill"><span class="dot"></span>NVDA</span>
            <span class="ticker-pill"><span class="dot"></span>TSLA</span>
        </div>
    </div>

    <div class="container">
        <div id="timeline" class="timeline">
            <div class="empty">
                <div class="icon">⏳</div>
                <p>Loading analyses...</p>
            </div>
        </div>
    </div>

    <div class="footer">
        ⚠️ Not financial advice. For educational and informational purposes only.<br>
        Data from Yahoo Finance. Analysis generated by AI.
    </div>

    <script>
    (async () => {
        const el = document.getElementById('timeline');

        let data = [];
        try {
            const r = await fetch('data.json?v=' + Date.now());
            data = await r.json();
        } catch(e) {
            el.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No data yet. Check back after market open.</p></div>';
            return;
        }

        data.sort((a, b) => b.date.localeCompare(a.date));

        if (!data.length) {
            el.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No analyses available yet.</p></div>';
            return;
        }

        function esc(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function fmtDate(ds) {
            const d = new Date(ds + 'T12:00:00');
            const month = d.toLocaleDateString('en-US', { month: 'short' });
            const day = d.getDate();
            const year = d.getFullYear();
            const weekday = d.toLocaleDateString('en-US', { weekday: 'short' });
            return { display: `${month} ${day}, ${year}`, weekday };
        }

        el.innerHTML = data.map((entry, i) => {
            const { display, weekday } = fmtDate(entry.date);

            const prices = (entry.prices || []).map(p =>
                `<span class="price-chip"><span class="sym">${p.ticker}</span>$${p.price}</span>`
            ).join('');

            const bullets = (entry.summary || []).map(s =>
                `<li>${esc(s)}</li>`
            ).join('');

            const hasBody = entry.body && entry.body.trim().length > 0;

            return `
            <div class="card" data-idx="${i}">
                <div class="card-header">
                    <div class="card-date">${display}<span class="day">${weekday}</span></div>
                    <div class="card-prices">${prices}</div>
                </div>
                ${bullets ? `<div class="card-summary"><ul class="bullet-list">${bullets}</ul></div>` : ''}
                ${hasBody ? `
                <div class="card-toggle" onclick="this.parentElement.classList.toggle('open')">
                    <span class="label-show">Show full analysis</span>
                    <span class="label-hide">Hide full analysis</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="card-body"><div class="card-body-inner"><pre>${esc(entry.body)}</pre></div></div>
                ` : ''}
            </div>`;
        }).join('');
    })();
    </script>
</body>
</html>
