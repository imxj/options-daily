<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Options Playbook | GOOG · NVDA · TSLA</title>
    <meta name="description" content="Daily options trading analysis for GOOG, NVDA, TSLA — CSP, covered calls, LEAPs. Updated every trading day at 9:30 AM PT.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 0.3rem;
        }
        .header .tagline {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .ticker-row {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }
        .ticker-pill {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.25rem 0.7rem;
            border-radius: 4px;
            background: #f0f0f0;
            color: #555;
            letter-spacing: 0.03em;
        }

        /* ── Container ── */
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 1.5rem 1rem 4rem;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .card-header {
            padding: 0.85rem 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-date {
            font-size: 0.95rem;
            font-weight: 600;
            color: #222;
        }
        .card-date .day {
            color: #999;
            font-weight: 400;
            font-size: 0.85rem;
            margin-left: 0.3rem;
        }
        .card-prices {
            display: flex;
            gap: 0.5rem;
        }
        .price-chip {
            font-size: 0.75rem;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            padding: 0.15rem 0.45rem;
            border-radius: 3px;
            background: #f5f5f5;
            color: #555;
        }
        .price-chip .sym {
            color: #999;
            margin-right: 0.15rem;
        }

        /* ── Summary ── */
        .card-summary {
            padding: 0 1.1rem 0.85rem;
        }
        .bullet-list {
            list-style: none;
        }
        .bullet-list li {
            position: relative;
            padding: 0.2rem 0 0.2rem 1.2rem;
            font-size: 0.87rem;
            color: #555;
            line-height: 1.5;
        }
        .bullet-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #bbb;
            font-size: 1.1rem;
        }
        .bullet-list li:nth-child(1)::before { color: #4caf50; }
        .bullet-list li:nth-child(2)::before { color: #ff9800; }
        .bullet-list li:nth-child(3)::before { color: #f44336; }

        /* ── Toggle ── */
        .card-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.55rem 1rem;
            border-top: 1px solid #eee;
            cursor: pointer;
            color: #999;
            font-size: 0.78rem;
            user-select: none;
            transition: background 0.15s;
        }
        .card-toggle:hover {
            background: #f9f9f9;
            color: #666;
        }
        .card-toggle .arrow {
            transition: transform 0.2s;
            font-size: 0.6rem;
        }
        .card.open .card-toggle .arrow { transform: rotate(180deg); }
        .card.open .card-toggle .label-show { display: none; }
        .card .card-toggle .label-hide { display: none; }
        .card.open .card-toggle .label-hide { display: inline; }

        /* ── Detail ── */
        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .card.open .card-body {
            max-height: 50000px;
        }
        .card-body-inner {
            padding: 1rem 1.1rem;
            border-top: 1px solid #eee;
            background: #fcfcfc;
        }
        .card-body pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.78rem;
            line-height: 1.7;
            color: #444;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #aaa;
            font-size: 0.75rem;
            border-top: 1px solid #e5e5e5;
        }

        /* ── Empty ── */
        .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: #aaa;
        }
        .empty .icon { font-size: 2rem; margin-bottom: 0.5rem; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .header { padding: 1.5rem 1rem; }
            .header h1 { font-size: 1.3rem; }
            .card-prices { display: none; }
            .container { padding: 1rem 0.75rem 3rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Daily Options Playbook</h1>
        <p class="tagline">Strategy analysis · Updated every trading day at 9:30 AM PT</p>
        <div class="ticker-row">
            <span class="ticker-pill">GOOG</span>
            <span class="ticker-pill">NVDA</span>
            <span class="ticker-pill">TSLA</span>
        </div>
    </div>

    <div class="container">
        <div id="entries">
            <div class="empty">
                <div class="icon">⏳</div>
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <div class="footer">
        ⚠️ Not financial advice. For educational and informational purposes only.<br>
        Data from Yahoo Finance. Updated on trading days.
    </div>

    <script>
    (async () => {
        const el = document.getElementById('entries');
        let data = [];
        try {
            const r = await fetch('data.json?v=' + Date.now());
            data = await r.json();
        } catch(e) {
            el.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No data yet.</p></div>';
            return;
        }

        data.sort((a, b) => b.date.localeCompare(a.date));
        if (!data.length) {
            el.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No analyses yet.</p></div>';
            return;
        }

        function esc(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        el.innerHTML = data.map((entry, i) => {
            const d = new Date(entry.date + 'T12:00:00');
            const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const weekday = d.toLocaleDateString('en-US', { weekday: 'short' });

            const prices = (entry.prices || []).map(p =>
                `<span class="price-chip"><span class="sym">${p.ticker}</span>$${p.price}</span>`
            ).join('');

            const bullets = (entry.summary || []).map(s =>
                `<li>${esc(s)}</li>`
            ).join('');

            const hasBody = entry.body && entry.body.trim().length > 0;

            return `
            <div class="card${i === 0 ? ' open' : ''}">
                <div class="card-header">
                    <span class="card-date">${dateStr}<span class="day">${weekday}</span></span>
                    <div class="card-prices">${prices}</div>
                </div>
                ${bullets ? `<div class="card-summary"><ul class="bullet-list">${bullets}</ul></div>` : ''}
                ${hasBody ? `
                <div class="card-toggle" onclick="this.parentElement.classList.toggle('open')">
                    <span class="label-show">Show details</span>
                    <span class="label-hide">Hide details</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="card-body"><div class="card-body-inner"><pre>${esc(entry.body)}</pre></div></div>
                ` : ''}
            </div>`;
        }).join('');
    })();
    </script>
</body>
</html>
